name: Production Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # 1. THE QUALITY GATES
  quality-check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # Tell GitHub where to find the lock file for caching
          cache-dependency-path: apihub/package-lock.json

      - name: Install & Test
        working-directory: ./apihub
        run: |
          npm install
          npm run lint
          npm test

  # 2. THE DEPLOYMENT (Only runs if Quality Check passes)
  deploy:
    name: Production Deployment
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- BACKEND DEPLOY (Railway) ---
      - name: Deploy Backend
        working-directory: ./apihub/server
        run: |
          npm install -g @railway/cli
          railway up --service apihub-backend -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # --- FRONTEND DEPLOY (Netlify) ---
      - name: Build Frontend
        working-directory: ./apihub
        run: |
          npm install
          npm run build
        
      - name: Upload to Netlify
        uses: nwtgck/actions-netlify@v2.0
        with:
          publish-dir: './apihub/dist'
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
