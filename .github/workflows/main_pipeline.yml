name: Production Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # 1. THE QUALITY GATES
  quality-check:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apihub/package-lock.json

      - name: Install & Test
        working-directory: ./apihub
        run: |
          npm install
          npm run lint
          npm test

  # 2. THE DEPLOYMENT (Only runs if Quality Check passes)
  deploy:
    name: Production Deployment
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --- BACKEND DEPLOY (Railway) ---
      - name: Deploy Backend
        working-directory: ./apihub/server
        run: |
          npm install -g @railway/cli
          railway up --service APIHub --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # --- FRONTEND DEPLOY (Netlify) ---
      - name: Deploy to Netlify
        working-directory: ./apihub
        run: |
          npm install -g netlify-cli
          netlify deploy --dir=dist --prod --site=${{ secrets.NETLIFY_SITE_ID }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --message="Deploy from GitHub Actions"
