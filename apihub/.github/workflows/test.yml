name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [frontend, backend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # We cache root npm, but since we have two package.json, we handle them carefully

      - name: Install Dependencies
        run: |
          if [ "${{ matrix.project }}" == "frontend" ]; then
            npm ci
          else
            cd server && npm ci
          fi

      - name: Run Tests
        run: |
          if [ "${{ matrix.project }}" == "frontend" ]; then
            npm test
          else
            cd server && npm test
          fi
