name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  # We removed the frontend job because Netlify will handle it automatically
  # through its own UI integration.

  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: |
          cd server
          railway up --service apihub-backend -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
