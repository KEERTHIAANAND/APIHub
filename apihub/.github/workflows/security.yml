name: Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Node Security Audit (Frontend)
        run: npm audit --audit-level=high

      - name: Node Security Audit (Backend)
        run: |
          cd server
          npm audit --audit-level=high
