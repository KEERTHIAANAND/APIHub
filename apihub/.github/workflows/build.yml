name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build Projects
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: [frontend, backend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          if [ "${{ matrix.project }}" == "frontend" ]; then
            npm ci
          else
            cd server && npm ci
          fi

      - name: Build
        run: |
          if [ "${{ matrix.project }}" == "frontend" ]; then
            npm run build
          else
            cd server && npm run build
          fi

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project }}-build
          path: |
            dist/
            server/
          # For frontend it's dist, for backend we just want the server folder.
          # Note: Adjusting path based on project
          if-no-files-found: ignore
